services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: abhiaya
      POSTGRES_PASSWORD: abhiaya
      POSTGRES_DB: abhiaya
    ports:
      # 5433 on the host, not 5432: another Postgres (an Odoo stack) already owns 5432 on
      # this machine, and colliding on it silently sends you to the WRONG database — the
      # symptom is a baffling "password authentication failed".
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Creates the abhiaya_test database on first boot, so pytest never runs against
      # dev data. Only executes when the volume is empty — `docker compose down -v` if
      # you need it re-run.
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U abhiaya"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
