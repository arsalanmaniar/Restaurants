name: CI

"on":
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    # Real Postgres 16, not SQLite — the app relies on JSONB, Postgres enum types, and
    # ON DELETE RESTRICT/SET NULL behaviour that SQLite does not have.
    # POSTGRES_DB creates the database directly, so it is already named "abhiaya_test"
    # (required by conftest.py::pytest_configure, which refuses to run against anything
    # else — seed() commits, so pointing it at the wrong database would write demo data).
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: abhiaya
          POSTGRES_PASSWORD: abhiaya
          POSTGRES_DB: abhiaya_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U abhiaya"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          # DEBUG=true and a database name ending in "_test" are both required by the
          # safety guard in tests/conftest.py::pytest_configure.
          DEBUG: "true"
          DATABASE_URL: postgresql+psycopg://abhiaya:abhiaya@localhost:5432/abhiaya_test
          # Dummy value — nothing here talks to a real JWT-verifying third party.
          JWT_SECRET: ci-dummy-secret-not-for-prod
          PYTHONPATH: ${{ github.workspace }}/backend
        run: pytest
        # No GROQ_API_KEY, UltraMsg, or payment credentials needed: the suite stubs the
        # Groq model and uses a fake payment gateway. Migrations and seed data are applied
        # automatically by the session-scoped `seeded` fixture — no separate step here.
